name: Build and Push to ACR Business Edition
on:
  push:
    branches: ["main"]
env:
  ACR_ENDPOINT: oss-excel-prod-registry.ap-southeast-7.cr.aliyuncs.com
  REGION: ap-southeast-7
  NAMESPACE: inventory-apps
  REPO_NAME: excel-processor
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_REGISTRY_PASSWORD }}" | docker login ${{ env.ACR_ENDPOINT }} --username ${{ secrets.ACR_USERNAME }} --password-stdin
      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ env.ACR_ENDPOINT }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest .
      - name: Push to ACR
        run: |-
          docker push ${{ env.ACR_ENDPOINT }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }} # Your ECS IP
          username: root # Your ECS Username
          key: ${{ secrets.ECS_SSH_KEY }} # The Private Key we talked about
          script: |
            # 1. Login to ACR INSIDE the ECS server
            echo "${{ secrets.ACR_REGISTRY_PASSWORD }}" | docker login ${{ env.ACR_ENDPOINT }} --username ${{ secrets.ACR_USERNAME }} --password-stdin

            # 2. THE PULL HAPPENS HERE (on your server)
            docker pull ${{ env.ACR_ENDPOINT }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest

            # 3. Restart the container
            docker rm -f my-app || true
            docker run -d -p 80:8501 --name my-app \
              -e OSS_ACCESS_KEY=${{ secrets.OSS_ACCESS_KEY }} \
              -e OSS_SECRET_KEY=${{ secrets.OSS_SECRET_KEY }} \
              -e OSS_BUCKET=${{ secrets.OSS_BUCKET }} \
              -e OSS_ENDPOINT=${{ secrets.OSS_ENDPOINT }} \
              ${{ env.ACR_ENDPOINT }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest
