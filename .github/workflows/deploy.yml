name: Build and Push to ACR Business Edition
on:
  push:
    branches: ["main"]
env:
  # Values from your screenshots
  ACR_ENDPOINT: oss-excel-prod-registry.ap-southeast-7.cr.aliyuncs.com
  ACR_INSTANCE_ID: cri-ienc7p4u22kqw2ce
  REGION: ap-southeast-7
  NAMESPACE: inventory-apps
  REPO_NAME: excel-processor
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Log in to Alibaba Cloud ACR
        uses: aliyun/acr-login@v1
        with:
          region-id: ${{ env.REGION }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY }}
          access-key-secret: ${{ secrets.OSS_SECRET_KEY }}
          instance-id: ${{ env.ACR_INSTANCE_ID }}
      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ env.ACR_ENDPOINT }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest .
      - name: Push to ACR
        run: |-
          docker push ${{ env.ACR_ENDPOINT }}/${{ env.NAMESPACE }}/${{ env.REPO_NAME }}:latest
